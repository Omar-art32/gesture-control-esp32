; ════════════════════════════════════════════════════════
;  GESTOD — Control de gestos con ESP32
;  Todas las librerías verificadas en PlatformIO Registry
; ════════════════════════════════════════════════════════

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; ── Sistema de archivos ─────────────────────────────────
board_build.filesystem = littlefs

; ── Monitor ─────────────────────────────────────────────
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder

; ── Librerías ───────────────────────────────────────────
lib_deps =
    ; Servidor web asíncrono + WebSocket
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    ESP32Async/AsyncTCP @ ^3.3.2

    ; Teclado BLE HID
    t-vk/ESP32 BLE Keyboard @ ^0.3.2

    ; Sensor de gestos PAJ7620
    RevEng PAJ7620 @ ^1.4.1

    ; Pantalla OLED SSD1306 — no necesita dependencias extra en ESP32
    adafruit/Adafruit SSD1306 @ ^2.5.9
    adafruit/Adafruit GFX Library @ ^1.11.9

    ; JSON para config de gestos por WebSocket
    bblanchon/ArduinoJson @ ^7.3.0

; ── Flags ───────────────────────────────────────────────
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DUSE_NIMBLE

; NOTA: El LED RGB NO necesita librería.
; Se controla con ledcWrite() nativo del ESP32 (PWM por hardware).